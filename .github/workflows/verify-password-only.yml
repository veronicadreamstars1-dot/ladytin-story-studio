name: Verify password-only access

on:
  push:
    branches:
      - feature/pinterest-reference-library
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact commit
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install pinned dependencies
        run: npm ci

      - name: Run parser, Pinterest, cloud, Presence, routing, ZIP and shared-access tests
        run: npm test

      - name: Run syntax lint
        run: npm run lint

      - name: Run typecheck command
        run: npm run typecheck

      - name: Build and repeat security checks
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Upload exact verified static build
        uses: actions/upload-artifact@v4
        with:
          name: ladytin-password-only-dist
          path: dist
          if-no-files-found: error
          retention-days: 1
